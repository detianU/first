<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronic Shop Items</title>

  <!-- Bootstrap 5 (для красивых карточек) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      padding: 40px 20px;
    }
    h1 {
      color: #c9d1d9;
      text-align: center;
      margin-bottom: 40px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      color: #c9d1d9;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-8px);
    }
    .card-title {
      color: #58a6ff;
    }
    .card-text {
      color: #8b949e;
    }
    .price {
      color: #7ee787;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .btn-details {
      background: #238636;
      border: none;
    }
    .btn-details:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Electronic shop items</h1>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" th:each="item : ${items}">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title" th:text="${item.name}"></h5>
          <p class="card-text flex-grow-1" th:text="${item.description}"></p>
          <p class="price mb-3" th:text="${item.price} + ' $'"></p>
          <a href="#" class="btn btn-details mt-auto">DETAILS</a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
